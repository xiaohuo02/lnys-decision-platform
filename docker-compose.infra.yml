# 仅数据库基础设施，后端和前端原生部署
services:
  mysql:
    image: mysql:8.0
    container_name: lnys-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: lnys_db
      MYSQL_USER: lnys_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./backend/db/seed_prompts.sql:/docker-entrypoint-initdb.d/02_seed_prompts.sql:ro
      - ./backend/db/seed_reviews.sql:/docker-entrypoint-initdb.d/03_seed_reviews.sql:ro
      - ./backend/db/seed_traces.sql:/docker-entrypoint-initdb.d/04_seed_traces.sql:ro
      - ./backend/db/seed_knowledge.sql:/docker-entrypoint-initdb.d/05_seed_knowledge.sql:ro
      - ./backend/db/seed_team.sql:/docker-entrypoint-initdb.d/06_seed_team.sql:ro
      - ./backend/db/seed_memory.sql:/docker-entrypoint-initdb.d/07_seed_memory.sql:ro
      - ./backend/db/seed_kb_v2.sql:/docker-entrypoint-initdb.d/08_seed_kb_v2.sql:ro
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 10
      start_period: 30s
    restart: always

  redis:
    image: redis:7-alpine
    container_name: lnys-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: lnys-postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-lnys_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-lnys_checkpoint}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lnys_user} -d ${POSTGRES_DB:-lnys_checkpoint}"]
      interval: 10s
      retries: 5
      start_period: 15s
    restart: always

volumes:
  mysql_data:
  redis_data:
  postgres_data:
