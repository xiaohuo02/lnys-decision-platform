# 生产环境全容器部署
# 启动前需先创建 .env.prod：cp .env.example .env.prod，然后填写真实密钥
# ⚠️  必须加 --env-file .env.prod ，否则 mysql/redis 的 compose 变量插值会从本地 .env 读取
# 部署命令：docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "80:80"                           # frontend/Dockerfile 内已包含 nginx，直接暴露端口
    depends_on:
      - backend
    restart: always
    networks:
      - lnys-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod                        # 生产镜像，无 --reload，2 workers
    env_file: .env.prod
    environment:
      - DB_HOST=mysql                     # 覆盖为 Docker 服务名（容器内部通信）
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres             # config.py 从组件字段自动构造 POSTGRES_CHECKPOINT_URL
      - ENV=production
      - ENABLE_MOCK_DATA=false
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - artifact_store:/app/artifact_store
      - chroma_data:/app/chroma_data     # ChromaDB 向量持久化
      - kb_uploads:/app/kb_uploads       # 知识库上传文件
      - hf_cache:/root/.cache/huggingface  # HuggingFace 模型缓存
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - lnys-net

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      lnys_db
      MYSQL_USER:          lnys_user
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./backend/db/seed_prompts.sql:/docker-entrypoint-initdb.d/02_seed_prompts.sql:ro
      - ./backend/db/seed_reviews.sql:/docker-entrypoint-initdb.d/03_seed_reviews.sql:ro
      - ./backend/db/seed_traces.sql:/docker-entrypoint-initdb.d/04_seed_traces.sql:ro
      - ./backend/db/seed_knowledge.sql:/docker-entrypoint-initdb.d/05_seed_knowledge.sql:ro
      - ./backend/db/seed_team.sql:/docker-entrypoint-initdb.d/06_seed_team.sql:ro
      - ./backend/db/seed_memory.sql:/docker-entrypoint-initdb.d/07_seed_memory.sql:ro
      - ./backend/db/seed_kb_v2.sql:/docker-entrypoint-initdb.d/08_seed_kb_v2.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
    restart: always
    networks:
      - lnys-net

  redis:
    image: redis:7-alpine
    command: >-
      redis-server
      ${REDIS_PASSWORD:+--requirepass }${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - lnys-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-lnys_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB:-lnys_checkpoint}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lnys_user} -d ${POSTGRES_DB:-lnys_checkpoint}"]
      interval: 10s
      retries: 5
    restart: always
    networks:
      - lnys-net

volumes:
  mysql_data:
  redis_data:
  postgres_data:
  artifact_store:
  chroma_data:
  kb_uploads:
  hf_cache:

networks:
  lnys-net:
    driver: bridge
